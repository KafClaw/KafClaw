{{- /*
  servicemonitor.yaml — Prometheus Operator ServiceMonitor for kafclaw.

  Rendered only when metrics are enabled AND the monitoring.coreos.com/v1
  CRD is installed, so enabling metrics is safe on clusters without the
  Prometheus Operator (the default SAO demo ships none).

  BUG-0011: the rc4 kafclaw image serves /metrics (promhttp.Handler) on
  the dashboard port; this ServiceMonitor scrapes the named `dashboard`
  port at .Values.metrics.path.
*/}}
{{- if and .Values.metrics.enabled (.Capabilities.APIVersions.Has "monitoring.coreos.com/v1") }}
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: {{ include "kafclaw.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "kafclaw.labels" . | nindent 4 }}
    {{- with .Values.metrics.serviceMonitor.labels }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
spec:
  selector:
    matchLabels:
      {{- include "kafclaw.selectorLabels" . | nindent 6 }}
  endpoints:
    - port: dashboard
      path: {{ .Values.metrics.path | quote }}
      interval: {{ .Values.metrics.serviceMonitor.interval | quote }}
      scrapeTimeout: {{ .Values.metrics.serviceMonitor.scrapeTimeout | quote }}
{{- end }}
